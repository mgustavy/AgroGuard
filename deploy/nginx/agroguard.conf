# AgroGuard nginx site config.
# Serves the built frontend and reverse-proxies the API on the same origin
# (so no CORS is needed and one domain covers both).
#
# Install: see deploy/README.md. Leave server_name as "_" for IP-only serving.
# For HTTPS, set server_name to your domain BEFORE running certbot -- the certbot
# nginx installer matches the certificate to a server block by name, and cannot
# match the "_" catch-all.

server {
    listen 80;
    server_name _;

    # Built frontend (copy src/dashboard/dist/* here).
    root /var/www/agroguard;
    index index.html;

    # Single-page app: unknown paths fall back to index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API. The trailing slash on proxy_pass strips the /api prefix, so
    # /api/risk/live/Arusha reaches the app as /risk/live/Arusha.
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
